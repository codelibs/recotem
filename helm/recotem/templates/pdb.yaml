{{- if .Values.pdb.enabled -}}
{{- if and .Values.pdb.minAvailable .Values.pdb.maxUnavailable -}}
{{- fail "pdb.minAvailable and pdb.maxUnavailable are mutually exclusive — set only one (see values.yaml comment)" -}}
{{- end -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "recotem.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "recotem.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "recotem.selectorLabels" . | nindent 6 }}
  {{- if .Values.pdb.minAvailable }}
  minAvailable: {{ .Values.pdb.minAvailable }}
  {{- end }}
  {{- if .Values.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  {{- end }}
{{- end }}
