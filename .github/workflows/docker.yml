name: recotem / docker

# Build-only on pull requests; build + push on main branch and version tags.
# Image: ghcr.io/codelibs/recotem
# Dockerfile: Dockerfile
# Security note: no untrusted user input (PR titles, commit messages, etc.) is
# interpolated into any run: command. All github.event.* data is used only
# via docker/metadata-action which handles escaping internally.
on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: codelibs/recotem

jobs:
  build:
    name: docker build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  trivy:
    name: trivy vulnerability scan
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Build local image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: recotem:scan
          platforms: linux/amd64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: recotem:scan
          format: sarif
          output: trivy-results.sarif
          severity: "CRITICAL,HIGH"
          # Skip CVEs without an upstream fix.  Slim base images frequently
          # carry HIGH OS CVEs (libcap2, ncurses-bin, libudev1, ...) that
          # have no fixed Debian version yet — gating CI on these would mean
          # the pipeline is permanently red with nothing the project can do
          # about it.  We rebuild on every push, so as soon as a fix lands
          # in the base image we pick it up automatically.
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
