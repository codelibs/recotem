{{- if and (eq .Values.recipes.source "configMap") .Values.recipes.configMap.managed -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.recipes.configMap.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "recotem2.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
data:
  {{- range $filename, $content := .Values.recipes.configMap.data }}
  {{ $filename }}: |
    {{- $content | nindent 4 }}
  {{- end }}
{{- end }}
