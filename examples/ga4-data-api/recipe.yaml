# examples/ga4-data-api/recipe.yaml
#
# Minimal recipe that trains a recommender from a Google Analytics 4 property
# using the `ga4` data source via the Data API. No BigQuery Export required.
#
# Prerequisites:
#   1. GA4 property ID (numeric, not the G-XXXX measurement ID).
#   2. Service account with roles/analytics.viewer on the property.
#   3. Application Default Credentials (gcloud auth application-default login).
#
# Train:
#   export $(uv run recotem keygen --type signing | grep '^env_entry=' | sed 's/^env_entry=//')
#   uv run recotem train examples/ga4-data-api/recipe.yaml
#
# The trained artifact is written to ./artifacts/ga4_demo.recotem

name: ga4_demo

source:
  type: ga4
  property_id: "999999999"  # Replace with your numeric GA4 property ID
  user_dimension: userPseudoId    # or userId if you've configured User-ID
  item_dimension: itemId
  time_dimension: date
  event_names: [purchase, view_item, add_to_cart]
  lookback_days: 90
  max_rows: 1_000_000
  weight_column: event_count

schema:
  user_column: userPseudoId
  item_column: itemId
  time_column: date

cleansing:
  drop_null_ids: true
  dedup: none

training:
  algorithms: [TopPop, RP3beta, IALS]
  metric: ndcg
  cutoff: 10
  n_trials: 5
  split:
    scheme: random
    heldout_ratio: 0.1
    seed: 42

output:
  path: ./artifacts/ga4_demo.recotem
  versioning: always_overwrite
