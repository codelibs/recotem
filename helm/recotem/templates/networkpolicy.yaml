{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "recotem.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "recotem.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "recotem.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  # Note: an ingress rule with `from: []` matches ALL sources (Kubernetes
  # NetworkPolicy spec) — the opposite of deny-all. The canonical deny-all
  # form is `ingress: []` combined with policyTypes including Ingress.
  {{- if .Values.networkPolicy.ingressFromPodSelector }}
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressFromPodSelector | nindent 14 }}
      ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
  {{- else }}
  # No ingress pod selector configured — deny all inbound traffic.
  ingress: []
  {{- end }}

  egress:
    # Allow DNS resolution.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow outbound HTTPS for object store access (S3, GCS, Azure Blob).
    - ports:
        - port: 443
          protocol: TCP
    # Allow outbound HTTP on 8080 for internal health checks or sidecars if needed.
    # Remove this rule if not needed.
    - ports:
        - port: 8080
          protocol: TCP
{{- end }}
